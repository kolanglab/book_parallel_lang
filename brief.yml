---
title: 並列言語の処理系入門
language: ja
audience: 学部3年生くらいで、プログラミング言語処理系初心者
notes: |-
  プログラミング言語処理系に、並列化の機能を入れるために基本的な話から、応用的な話まで盛り込む。
  実装したいプログラミング言語に並列化のための仕組みがある場合と、そうでない場合（一見並列化と関係ない箇所もある）がある。

  Claude code は下記の目次を提案しましたが、これにこだわらないでもっと盛り込んでもいいです。pthread 周りが不足してるかな？

    第I部　基礎を固める

    1. 導入：並行と並列の区別、なぜ今必要か（マルチコア、ムーアの法則の終焉）
    2. ハードウェアの前提：メモリ階層・キャッシュ、NUMA、SIMD、GPU をさわりだけ
    3. 並行・並列モデルの地図：共有メモリ vs メッセージパッシング、アクター、CSP、タスク並列／データ並列
    4. メモリモデル入門：逐次一貫性、リオーダリング、acquire/release、メモリバリア（3年生には“なぜ素朴な共有が壊れるか”として導入）
    5. 題材となる極小インタプリタの提示＋データ競合を実際に踏ませる体験

    第II部　言語に並列機能を「載せる」（ユーザから見える機能）

    6. スレッドを言語機能にする：生成・join・スレッドローカル、スタック管理
    7. 同期プリミティブの内側：atomic／CAS、spinlock、futex、mutex、条件変数
    8. lock-free の世界：ABA 問題、wait-free、RCU、ハザードポインタ（発展としてここに）
    9. メッセージパッシング：チャネル、select、アクター、future／promise
    10. 軽量スレッドとスケジューラ：ファイバー、M:N、work-stealing、async/await の CPS／ステートマシン化、構造化並行性
    11. データ並列：並列ループ、map／reduce

    第III部　処理系内部を並列実行に耐えさせる（一見関係ない箇所）

    12. グローバル共有状態の棚卸し：シンボル／定数表、クラス階層、インターン文字列
    13. メモリ管理と GC：アロケータの競合、Stop-the-world → 並行・並列 GC、write barrier、false sharing
    14. 各種キャッシュと遅延初期化：メソッド／インラインキャッシュ、lazy init の競合
    15. 参照カウントを atomic 化する代償、I/O・例外・シグナルの排他
    16. GIL/GVL という“逃げ”とその代償 → 外すと第III部が全部問題化する、という物語
    17. オブジェクト共有モデル：隔離・コピー・所有権（Rust の借用、Ractor 的アプローチ）、型で防ぐ（session types）

    第IV部　検証・評価とケーススタディ

    18. デバッグとテスト：データ競合検出（ThreadSanitizer）、record/replay、決定的実行、モデル検査
    19. 性能評価：Amdahl／Gustafson、スケーラビリティの測り方、false sharing の実測
    20. ケーススタディ横断：Go ランタイム、Erlang/Elixir BEAM、Java Virtual Threads (Loom)、Ruby GVL→Ractor、CPython no-GIL


    注意:
    * 未使用用語は説明する
    * 例だけの (sub)section は作らない。ちゃんと説明する
    * コードを出すだけの (sub)section は作らない。ちゃんと説明する
    * 参考文献は積極的に引用する
    * 言語処理系のプログラムの例を出すときはなるべく Ruby を使う
